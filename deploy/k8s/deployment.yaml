apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-info
  labels:
    app: k8s-info
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-info
  template:
    metadata:
      labels:
        app: k8s-info
    spec:
      serviceAccountName: k8s-info-sa
      containers:
      - name: k8s-info
        image: ghcr.io/nxt5656/devops-k8s-info:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: SERVER_ADDR
          value: ":8080"
        - name: API_BASE_SEGMENT
          value: "k8s-info"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
